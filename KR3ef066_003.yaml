body:
  text: 卷三少陽篇少陽主半表半裡何謂少陽經症曰口苦咽乾目眩是也有虛火實火二症之辨寒熱往來於外胸脅苦滿默默不欲食心煩喜嘔為虛火症宜小柴胡湯寒熱往來於外心中痞硬鬱郁微煩嘔不止為實火症宜大柴胡湯何謂少陽腑症曰少陽主寒熱屬於半表則為經屬於半里則為腑其症雖無寒熱往來於外而有寒熱相搏於中有痞痛利嘔四症之辨因嘔而痞不痛者半夏瀉心湯胸中有熱而欲嘔胃中有邪氣而腹中痛宜黃連湯邪已入里則膽火下攻於脾而自利宜黃芩湯膽火上逆於胃而為嘔宜黃芩加半夏生薑湯以上四方寒熱攻補並用仍不離少陽和解法經云少陽之上相火治之所謂本也本之下中之見也見之下氣之標也又曰少陽從本又曰少陽為樞又熱病論曰三日少陽受之少陽主膽其脈循脅絡於耳故胸脅痛而耳聾其經脈出耳前後下循胸脅故為脅痛耳聾等症傷寒論云少陽之為病口苦苦從火化咽乾火勝則干目眩風火相煽則眩也此節為少陽證之提綱主少陽之氣化而言也柯韻伯云口咽目三者不可謂之表亦不可謂之裡是表之入里里之出表處所謂半表半裡是也三者能開能闔恰合樞機之象苦幹眩三者皆相火上走空竅而為病也此病自內之外人所不知惟病人自知診家所以不可無問法三證為少陽病機兼風火雜病而言少陽標陽本火標本不異故從本經云少陽為甲木主風火之為病論中止十節第一節言口苦咽乾目眩為少陽之總綱皆就氣化而言也以下補言經脈第二節云少陽中風兩耳無所聞者以少陽之脈從耳後入耳中出走耳前也目赤者以少陽之脈起於目鋭眥也胸中滿而煩者以樞不運則滿相火合於君火則煩也不可吐下者恐傷上下二焦之氣也吐下則悸而驚者以手少陽三焦合於手厥陰心包足少陽膽合於足厥陰肝吐則傷心包而為悸下則傷肝而為驚也此少陽自受之風邪戒其不可吐下從總綱中分出一綱也第三節云傷寒脈弦細者以弦為少陽之本脈而細則為寒邪傷經之脈也頭痛發熱屬少陽者以少陽之脈上頭角而為痛少陽之火發於外而為熱此屬少陽自受之寒邪也不可發汗發汗則譫語者以少陽主樞而不主表若發表汗則耗傷其津液以致胃不和而譫語故特申之曰此屬胃言所以運此樞者胃也胃和則愈胃不和則煩而悸者言胃和則能轉樞而病愈胃不和則手少陽三焦之火氣上逆而為煩足少陽膽氣失職而為悸也此少陽自受之寒邪戒其不可發汗從總綱中又分出一綱也但二者為少陽自受之風寒而更有少陽轉屬之風寒又從總綱中續分出一綱第四節云本太陽病不解轉入少陽者轉入即轉屬言少陽病自受外而又有轉屬之證也脅下硬滿者以少陽之脈其直者從缺盆下腋循胸過季脅也乾嘔不能食者以木火相通而膽喜犯胃也往來寒熱者以少陽居表裡之間進而就陰則寒退而從陽則熱也此三句為少陽病大略尚未吐下者以未經吐下猶幸中氣之未傷也脈沉緊者以邪氣向內則沉太陽傷寒其本寒與少陽火熱相搏則脈緊言外可悟太陽中風其標陽與少陽相合則脈緩既入少陽無論傷寒中風皆為樞逆於內不得外達均宜小柴胡湯達之故曰與小柴胡湯見汗吐下皆非所宜惟此湯為對證之的劑也然而汗吐下三禁外又有溫針為尤忌第五節云若已吐下發汗溫針譫語柴胡湯證罷此為壞病者承上節尚未吐下句而言庸醫誤行吐下且更發汗溫針大傷中氣竭其胃液而譫語其脅下硬滿乾嘔不能食往來寒熱之柴胡湯證反罷胃壞全無樞象正與第三節所言屬胃胃和則愈之旨相反故特警之曰此為壞病也知犯何逆以法治之者言病無樞象斷不可用小柴胡之樞藥當知所犯何逆而救治之也且也自受轉屬誤治證各節既詳其義而合病之脈證不可不明傳經之同異不可不講欲已欲解之日時不可不知曷言合病第六節云三陽合病脈浮大上關上但欲眠寐者以太陽之浮陽明之大二脈俱上於少陽之關上則二陽之氣不得少陽樞轉而俱行於陰故但欲眠寐也目合則汗者以開目為陽合目為陰陽氣乘目合之頃內行於陰則外失所衛而汗出也曷言傳經第七節云傷寒六七日無大熱其人煩躁者此為陽去入陰故也蓋以七日來復於太陽太陽與少陰一腑一臟雌雄相應之道也若少陽病當太陽主氣之期樞有權則外轉而出樞失職則內入而深去太陽則身無大熱入少陰則其人煩躁此表裡相傳之義也第八節云傷寒三日三陽為盡三陰當受邪其人反能食而不嘔者此為三陰不受邪也蓋以三日為三陽之終太陰為三陰之首能食不嘔太陰不受邪便知三陰俱不受邪此以次第相傳之義也曷言欲已之日第九節云傷寒三日少陽脈小者為欲愈也言少陽本弦之脈轉而為小小則病退其病欲已不但三陰不受邪也曷言欲解之時第十節云少陽病欲解時從寅至辰上蓋以少陽之氣旺於寅卯至辰時上其氣已化陽氣大旺正可勝邪故也少陽全篇止此十節而病之源流分合無有弗備治之經權常變無有弗該熟讀而玩味之方知其妙門人問曰少陽篇止十節夫子逐節引其原文析其疑義與各家之妄逞臆見及畫蛇添足者不同第有論無方學者無從摸索本篇中止於第四節云本太陽病不解轉入少陽者與小柴胡湯一方其實此方詳於太陽篇中與陽明篇及各篇亦有之未可謂為少陽之專方然則治少陽病將何從下手乎曰太陽篇傷寒五六日中風往來寒熱胸脅苦滿默默不欲食心煩喜嘔以此數證為小柴胡之的證其餘兼證尚在或然或不然無定之間統以小柴胡湯主之論中謂有柴胡證但見一證便是不必悉具即此意也以下凡十五節皆論柴胡湯之證治不可謂為少陽之正方然少陽主風火之氣而所重在樞柴胡為轉樞之藥故後人取之以為和解之方汗下俱在所禁也然和解中亦兼及汗下時賢謂為權變法大抵證兼太陽之表則宜兼汗證兼陽明之裡則宜兼下如柴胡加桂枝湯柴胡加芒硝湯大柴胡湯柴胡桂枝湯等方是也然寒熱遊行於外則有柴胡等法而寒熱互搏於中則為痞嘔又有諸瀉心湯黃連湯黃芩湯等法柯韻伯論翼已詳言之至於少陽為樞而所以運此樞者胃也小柴胡湯中之參棗是補胃中之正氣以轉樞柴胡龍骨牡蠣湯是驅胃中之邪氣以轉樞補正即所以驅邪驅邪即所以補正一而二之二而一之不可姑待其樞折而救治無及也且也黃耆一味得初陽之氣初陽者少陽也手少陽三焦之氣上逆則為煩足少陽膽氣失職則為悸凡少陽樞折之壞症必重用此藥以救之也少陽寒熱往來病形見於外苦喜不欲病情得於內有苦喜欲三字非真嘔真滿真不能飲食也看往來二字即見有不寒熱時往來寒熱胸脅苦滿是無形之表心煩喜嘔默默不欲食是無形之裡其或胸中煩而不嘔或渴或腹中痛或脅下痞硬或心下悸小便不利或咳者此七證皆偏於里惟微熱為在表皆屬於無形惟脅痛痞硬為有形皆風寒通證惟脅下痞硬屬少陽總是氣分為病非有實熱可據故從半表半裡之治法少陽為遊部其氣遊行三焦循兩脅輸腠理是先天真元之正氣正氣虛不足以固腠理邪因其開得入其部少陽主膽為中正之官不容邪氣內犯必與之相搏搏而不勝所以邪結脅下也邪正相爭即往來寒熱更實更虛所以休作有時邪實正虛所以默默不欲飲食仲景於表證不用人參此因邪正分爭正不勝邪故用之扶元氣強主以逐寇也若外有微熱而不往來寒熱是風寒之表未解不可謂之半表當小發汗故去參加桂心煩與咳雖逆氣有餘而正氣未虛故去人參如太陽汗後身痛而脈沉遲與下後協熱利而心下硬是太陽之半表裡證也表雖不解裡氣已虛故參桂並用是知仲景用參皆是預保元氣更有脈證不合柴胡者仍是柴胡證本論云傷寒五六日頭汗出微惡寒手足冷心下滿口不欲食大便硬脈細者此為陽微結半在裡半在表也脈雖沉緊不得為少陰病者陰不得有汗今頭汗出故知非少陰也可與小柴胡湯此陽微結之治法也夫陰不得有汗亦須活看然亡陽與陰結其別在大便亡陽則咽痛吐利陰結則不能食而大便反硬也亡陽與陽結其別在汗亡陽者衛氣不固汗出必遍身陽結者邪熱閉結郁汗止在頭也且陽微結者謂少陽陽微故不能食而大便硬為的證非若純陽結為陽明陽盛以能食而大便硬為的證則陽結陽微結之辨又在食也故少陽之陽微結證欲與小柴胡湯必究其病在半表然微惡寒亦可屬少陰但頭汗出始可屬少陽故反復講明頭汗之義可與小柴胡而無疑也所以然者少陽為樞少陰亦為樞故見證多相似必於陰陽表裡辨之真而審之確始可以一劑而瘳此少陽少陰之疑似證又柴胡證之變局也脅居一身之半故脅為少陽之樞岐伯曰中於脅則下少陽此指少陽自病然太陽之邪欲轉屬少陽少陽之邪欲歸迸陽明皆從脅轉如傷寒四五日身熱惡風頭項強脅下滿者是太陽少陽並病將轉屬少陽之機也以小柴胡湯與之所以斷太陽之來路如陽明病發潮熱大便溏小便自可胸脅滿而不去者是少陽陽明並病此轉屬陽明之始也以小柴胡湯與之所以開陽明之出路若據此次第傳經之說必陽明而始傳少陽則當大便硬而不當大便溏當曰胸脅始滿不當曰滿而不去矣又陽明病脅下硬滿大便硬而嘔舌上白苔者此雖已屬陽明而少陽之證未罷也蓋少陽之氣遊行三焦因脅下之阻隔合上節之治節不行水精不能四布故舌上有白苔而嘔與小柴胡湯轉少陽之樞則上焦氣化始通津液得下胃不實而大便自輸矣身濈然而汗出解者是上焦津液所化故能開發腠理熏膚充身澤毛若霧露之溉與胃中邪熱症不同故以小柴胡湯主之所謂樞機之象宜熟玩者也
