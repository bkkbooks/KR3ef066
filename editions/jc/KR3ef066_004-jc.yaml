body:
  text: 卷四太陰篇太陰為濕土純陰之臟也病入太陰從陰化者多從陽化者少何謂太陰之邪從陰化傷寒論云腹滿吐食自利不渴手足自溫時腹自痛是也宜理中丸湯主之不愈宜四逆輩何謂太陰之邪從陽化傷寒論云發汗後不解腹痛急下之宜大承氣湯是也又曰腹滿時痛屬太陰也時痛者謂腹時痛時止桂枝加芍藥湯主之大實痛者大便堅實而痛桂枝加大黃湯主之內經云太陰之上濕氣治之所謂本也本之下中之見也見之下氣之標也又曰太陰從本又曰太陰為開又熱病論曰四日太陰受之太陰脈布胃中絡於嗌故腹滿而嗌乾傷寒論云太陰之為病腹滿而吐食不下自利益甚時腹自痛若下之必胸下結硬按傷寒論太陰病脈證只有八條後人謂為散失不全及王叔和之變亂而不知八條中有體有用有法有方真能讀者則取之無禁用之不竭矣所可疑者自第一節提綱外其第二節云太陰中風證四肢煩疼等句言其欲愈之脈而不言未愈時何如施治第三節云太陰病欲解時從亥至醜上以太陰主開地闢於醜故愈於其時也第四節云太陰病脈浮者可發汗宜桂枝湯而不言脈若不浮如何施治惟於第五節云自利不渴者屬太陰以其臟有寒故也當溫之宜服四逆輩曰輩者凡理中湯通脈四逆湯吳茱萸湯之類皆在其中第六節云傷寒脈浮而緩手足自溫者系在太陰太陰當發黃若小便自利者不能發黃至七八日雖暴煩下利日十餘行必自止以脾家實腐穢當去故也策七節云太陽病醫反下之因而腹滿時痛者桂枝加芍藥湯主之大實痛者桂枝加大黃湯主之第八節云太陰為病脈弱其人續自便利設當行大黃芍藥為訓者宜減之以其人胃氣弱易動故也此外並無方治以為少則誠少矣而不知兩節兩出其方大具經權之道宜分兩截看仲景所謂太陰證與內經人傷於寒為熱病腹滿嗌乾證不同提綱皆言寒濕為病以四逆湯為治內正法桂枝湯為治外正法自第一節至第五節一意淺深相承不離此旨所謂經也此為上半截第六節言傷寒脈浮而緩手足自溫十二句意者太陰以中見為主以上五節言不得中見之寒證若中見太過太陰濕土不與寒合而與熱合若小便利則不發黃若暴煩下利則腐穢當去是常證之外略有變局另作一小段承上即以起下第七節言太陽病誤下轉屬太陰腹滿時痛大實痛者以桂枝加芍藥加大黃為主治一以和太陰之經絡變四逆輩之溫而為和法變桂枝湯之解外而為通調內外法是於有力處通其權也一以脾胃相連不為太陰之開便為陽明之闔既闔而為大實痛不得不借陽明之捷徑以去脾家之腐穢要知提綱戒下原因腹時痛而言此從正面審到對面以立法又於暴煩下利十餘行自止節言其愈尚未言方此從腐穢既下後而想到不自下時之治法是於無方處互明方意以通權此為下半截總而言之四逆輩桂枝湯及桂枝加芍藥桂枝加大黃湯皆太陰病之要劑若不渴則四逆輩必須若脈弱則芍黃等慎用脈浮有向外之勢桂枝湯之利導最宜煩疼當未愈之時桂枝加芍藥湯亦可通用原文雖止八條而諸法無有不具柯韻伯等增入厚朴生薑半夏甘草人參湯白散麻仁丸等方欲廣其用反廢其活法大抵未讀聖經之前先聞砭剝叔和之語謂非經文無不可以任意增減移易致有是舉耳按沈堯封云太陰陽明俱屬土同主中州病則先形諸腹陽明為陽土陽道實故病則胃家實而非滿也太陰為陰土陰道虛故病則腹滿而不能實也凡風燥熱三陽邪犯陽明寒與溫二陰邪犯太陰陽邪犯陽則能食而不嘔陰邪犯陰則不能食而吐陽邪犯陽則不大便陰邪犯陰則自利證俱相反可認若誤下則胃中空虛客氣動膈在陽邪則懊憹而煩在陰邪則胸下結硬倘再誤攻必致利不止而死此太陰病之提綱凡稱太陰俱指腹滿言按柯韻伯云內經云太陰脈布胃中絡於嗌故腹滿嗌乾此熱傷太陰自陽部注經之證非論中所云太陰自病也仲景以太陰自病為提綱因太陰主內故提綱中不及中風四肢煩疼之表又為陰中之至陰故提綱中不及熱病嗌乾之證太陰為開又陰道虛太陰主脾所生病脾主濕又主輸故提綱中主腹滿時痛而吐利皆是裡虛不固濕勝外溢之證也脾虛則胃亦虛食不下者胃不主納也要知胃家不實便是太陰病
