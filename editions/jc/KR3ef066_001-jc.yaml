body:
  text: 卷一太陽篇太陽為寒水之經主一身之表何謂太陽經症曰頭痛項強發熱惡寒是也有虛邪實邪之辨脈緩自汗惡風為虛邪宜桂枝湯如八九日過經不解如瘧狀面熱身癢以其不得小汗故也宜桂枝麻黃各半湯因前此未汗不得不發其汗因日數頗久故小發其汗如服桂枝湯大汗出後形如瘧日再發者以餘邪未盡故也宜桂枝二麻黃一湯大汗之後不得再行大汗之法而餘邪未盡不得不從汗而竭之但藥品宜輕耳脈浮緊無汗惡寒為實邪宜麻黃湯如無汗煩躁者加石膏薑棗名大青龍湯如干嘔而咳去杏仁加五味乾薑半夏細辛芍藥名為小青龍湯此二湯即麻黃湯之加減總不出麻黃湯之範圍此二法治表中之表也何謂太陽腑症曰表邪不去必入於裡膀胱為表中之裡也有蓄水蓄血之辨太陽病其人口渴煩躁不得眠脈浮小便不利水入即吐為膀胱蓄水症宜五苓散太陽病其人如狂小腹硬滿小便自利脈沉為膀胱蓄血症宜桃仁承氣湯此二法治表中之裡也何謂太陽變症曰汗下失宜從陰從陽之不一也不應下而下之續得下利清穀身疼痛宜四逆湯以救清穀之裡又以桂枝湯以救身疼痛之表病發熱頭痛脈反沉若不瘥身體疼痛當救其里宜四逆湯大汗大下利而厥冷者四逆湯主之太陽病發汗太過遂漏不止其人惡風小便難四肢微急難以屈伸桂枝加附子湯主之太陽病發汗太過動其榮血而衛邪反內伏其人仍發熱心下悸頭眩身瞤動振振欲擗地者真武湯主之以上言汗下太過傷正而虛其陽陽虛則從少陰陰化之症多以太陽少陰為表裡也陽盛於內誤服桂枝湯大汗出後大煩大渴不解脈洪大者白虎加人參湯主之傷寒若吐若下後七八日不解熱結在裡表裡俱熱時時惡風大渴舌上乾燥而煩欲飲水數升者白虎加人參湯主之傷寒不大便六七日為里症頭痛發熱為表症外不解由於內不通也下之里和而表自解矣與承氣湯病人煩熱汗出則解又如瘧狀日晡所發熱屬陽明也脈實者宜下之與大承氣湯脈虛者宜發汗與桂枝湯發汗後惡寒者虛故也不惡寒但熱者實也當和胃氣與調胃承氣湯太陽病未解脈陰陽俱停停者沉滯不起也陰陽者尺寸也必先振慄汗出乃解但陽脈微者先汗而解但陰脈微者下之而解若欲下之宜調胃承氣湯按此脈微即上文脈停也以上言汗下失宜熱熾而傷其陰陰傷則從陽明陽化之症多以太陽陽明遞相傳也何謂發汗利水為治太陽兩大門曰邪傷太陽病在寒水之經驅其水氣以外出則為汗逐其水氣以下出後為黃涎蓄水前為小便長太陽為寒水之經邪之初傷必須發汗麻黃湯發皮膚之汗桂枝湯發經絡之汗葛根湯發肌肉之汗小青龍湯發心下之汗大青龍湯發其內擾胸中之陽氣而為汗此發汗之五法也若汗之而不能盡者則為水水在心下乾嘔而咳宜小青龍湯發熱而煩渴欲飲水水入即吐名曰水逆宜五苓散汗後心下痞硬乾噫食臭脅下有水氣腹中雷鳴下利者病勢雖在腹中而病根猶在心下宜生薑瀉心湯此水氣在上焦在上者汗而散之也若妄下之後自心上至小腹硬滿而痛不可近水與氣所結脈遲名大結胸宜大陷胸湯若項亦強如柔痓之狀宜大陷胸丸蓋病勢連於下者主以湯病勢連於上者主以丸是也若其結止在心下按之始痛脈浮滑名小結胸邪氣尚在脈絡宜小陷胸湯若無熱症名寒實結胸宜三物白散若心下痞硬滿引脅下痛乾嘔短氣汗出不惡寒三焦升降之氣阻格難通宜十棗湯此水氣在中焦中滿瀉之於內也若頭痛項強翕翕發熱無汗心下滿微痛小便不利者因膀胱之水不行營衛不調不能作汗宜以桂枝去桂加茯苓白朮湯治之是水氣在下焦在下者引而竭之是也內經云太陽之上寒氣治之所謂本也本之下中之見也見之下氣之標也又曰太陽從本從標又曰太陽為開又熱病論曰傷寒一日巨陽受之故頭項痛腰脊強傷寒論云太陽之為病脈浮頭項強痛而惡寒又云太陽病發熱汗出惡風脈緩者名為中風又云太陽中風陽浮而陰弱陽浮者熱自發陰弱者汗自出嗇嗇惡寒淅淅惡風翕翕發熱鼻鳴乾嘔者桂枝湯主之又云太陽病頭痛發熱身疼腰痛骨節疼痛惡風無汗而喘者麻黃湯主之太陽主一身之表六經中最外一層故表病俱屬太陽但有表中之表病在肌腠則有汗宜桂枝湯病在膚表則無汗宜麻黃湯兩法用之得當一劑可愈又有脈微惡寒面色反有熱色而身癢是邪欲出而未得遽出必得小汗而解宜桂枝麻黃各半湯又有服桂枝湯大汗出後形如瘧日再發是肌病兼見表病宜桂枝二麻黃一湯是二方即上兩法之佐也然二方能治肌腠膚表之病不能治經輸之病太陽之經輸在背內經云邪入於輸腰背乃強論中以項背強𠘧𠘧無汗惡風用葛根湯項背強𠘧𠘧反汗出惡風用桂枝加葛根湯二方亦上兩法之佐也但兩法俱是太陽本寒之症故方中取用辛熱之品若太陽標熱之自汗症不得徑用桂枝湯宜用芍藥甘草湯以各症與桂枝症無異惟腳攣急獨異是太陽之標熱合少陰之本熱之病也無汗症不得用麻黃湯宜用麻杏甘膏湯以各症與麻黃證相似惟初起口渴發熱而無惡寒或發汗已身灼熱不似論雖另別為溫病風溫之證然節首冠以太陽病三字蓋指太陽之標熱而言明明為一隅之舉不讀內經不能解也其云桂枝二越婢一湯為標內陷於裡陰而化熱故熱多寒少而脈微弱論曰無陽言無在表之陽也論曰不可發汗言不可發太陽之表汗也故用此湯直從里陰而外越之也此又可借用為上兩法之佐也然太陽為表而亦有里膀胱即太陽之裡也如太陽病發熱無汗而心下滿微痛小便不利不宜取汗宜桂枝去桂加茯苓白朮湯令小便利則愈又有發汗後脈浮小便不利微熱消渴之症又有中風發熱六七日不解而煩為表症渴欲飲水為里症論名曰表裡症水入則吐論名曰水逆證兩證俱宜五苓散多飲暖水以出汗此表中里症之治法也至若大青龍湯因脈浮緊身疼痛不汗出而煩躁為麻黃證之重者而設小青龍湯因表不解水停心下而咳噎變大青龍湯之大寒大散而為發汗利水之劑即是麻黃湯之加減總不出麻黃湯之範圍即若桂枝去芍藥湯因桂枝症誤下脈促胸滿而設桂枝去芍藥加附子湯又因前症脈不見促而見微身復惡寒而設桂枝加附子湯因發汗太過遂漏不止惡風小便難四肢微急難以屈伸而設此因大汗以亡陽因亡陽以脫液取附子以固少陰之陽固陽即所以止汗救液也推之汗後病已解復煩及桂枝症初服桂枝湯反煩不解刺風池風府卻再與桂枝湯則愈其用甚廣總不出於桂枝證頭痛發熱汗出惡風八個字之外須知太陽治法不外桂枝麻黃二湯服麻黃湯之後復有再服桂枝湯之法服桂枝湯之後並無再服麻黃湯之法更須知太陽為寒水之經病本寒者較多病標熱者較少若標本兼病亦以熱多寒少為欲愈治傷寒者當知所重矣此論太陽病以桂枝麻黃二湯為主一線到底千古注家無此明晰外此亦即二湯之更進一步非離乎二湯之外而立法也太陽主一身最外一層邪從外來須要驅之使出服上二湯尚不能出或留本經或侵他經必藉少陽之樞轉以達太陽之氣而外出也故小柴胡湯為太陽篇之要劑今人不知擅改為少陽主方失之遠矣故無論桂枝證麻黃證若值三日九日十五日少陽主氣之期必藉其樞轉而出或又見往來寒熱樞不轉現出開闔不利之象胸脅苦滿胸乃太陽出入之部脅為少陽所主之樞默默不欲食心煩默默必神機內郁而心煩喜嘔不欲食必胃氣不和而喜嘔嘔則逆氣少疏故喜也或涉於心而不涉於胃則胸中煩而不嘔或涉於陽明之燥氣則渴或涉於太陰之脾氣則腹中痛或涉於厥陰之肝氣則脅下痞硬或涉於少陰之腎氣則心下悸而小便不利或太陽藉少陽之樞轉已有向外之勢則不渴身有微熱或涉於太陰之肺氣則咳者皆以小柴胡為主而隨其或然之證加減而治之若太陽病過經不解先與小柴胡湯嘔不止心下急鬱郁微煩與大柴胡湯下之以平其胃則愈凡太陽篇有柴胡之方或因其病象有從樞欲達之意而以柴胡達之抑因其久郁未解之邪而以柴胡可以從樞達之無非乘機利導之法亦即麻黃桂枝二湯進一步之佐也推而言之太陽之氣外行於胸膈不能外而病於內實則為大小陷胸湯證虛則為諸瀉心湯證且太陽之氣上行而至於頭下行而歸於腹不能上而病於下從背而下結於胞室則為桃仁承氣湯證從胸而下瘀於胞室則為抵當湯證何莫非桂枝麻黃二湯應用不用或用之失法所致哉蓋太陽經正治法不過二十餘條而已其他則皆權變法斡旋法也假使治傷寒者審其脈之或緩或緊辨其症之有汗無汗則從而汗之解之如桂枝麻黃等法則邪卻而病除矣其或合陽明或合少陽或合三陽者則從而解之清之如葛根湯治太陽陽明合病下利葛根加半夏湯治合病不下利而但嘔者黃芩湯治太陽少陽合病而自利黃芩加半夏生薑湯治合病而嘔者如白虎湯治三陽合病其云腹滿者為陽明經熱合於前也其云身重者為太陽經熱合於後也其云難以轉側者為少陽經熱合於側也其云口不仁而面垢者熱合少陽之腑也其云譫語者熱合陽明之腑也其云遺尿者熱合太陽之腑也既審其為三陽之合又必得自汗出之的證而後用白虎湯之的方斯邪分而病解此為正治之法顧人氣體有虛實之殊臟腑有陰陽之異或素有痰飲痞氣以及咽燥淋瘡汗衄之疾或適當房室金刃產後亡血之餘是雖同為傷寒之候不得竟用麻桂之法矣於是有旋覆代赭石湯治傷寒汗吐下解後心下痞硬噫氣不除是胃氣弱而未和痰氣動而上逆之症有茯苓桂枝白朮甘草湯治吐下後邪解而為飲發之證金匱云膈間支飲其人喘滿心下痞堅又云心下有痰飲胸脅支滿目眩又云其人振振身瞤劇者必有伏飲其云發汗則動經者言無邪可發而反動其經氣也有承氣湯治傷寒六七日不大便頭痛有熱必衄以陽熱太重以此湯承在上之熱氣而使之下也有小建中湯以治傷寒二三日心悸而煩補中氣以生心血有炙甘草湯治脈結代心動悸啟腎陰以行於脈道有四逆湯治發熱頭痛脈反沉身體疼痛扶腎陽以救其虛陷是為權變之法而用桂枝麻黃等法又不能必其無過與不及之弊或汗出不徹而邪不外散則有傳變他經及發黃蓄血之病如中風以火劫汗則兩陽熏灼其身發黃陽盛則欲衄陰虛則小便難甚則見發噦譫語捻衣摸床諸危症服藥得小便利者方可治之如桂枝證外不解而熱結膀胱其人如狂血得自下乃愈若小腹急結有桃仁承氣湯之輕攻法如麻黃證表不解脈微而沉其人狂其邪反不結於胸而直下於少腹而硬滿為瘀熱在裡又身黃脈沉結小便自利不為水而為血其血不能自下必攻而始下又有抵當湯之峻攻法也或汗出過多而並傷其陽氣則有振振擗地肉瞤筋惕為真武湯之證有發汗後血液內亡身疼痛脈沉遲者為桂枝加芍藥生薑人參新加湯證有發汗過多虛其心氣其人叉手冒心喜按者為桂枝甘草湯證有發汗後虛其腎氣臍下悸欲作奔豚為茯苓桂枝甘草大棗湯證有發汗後傷其中氣不能運行升降而腹脹滿為厚朴生薑甘草人參半夏湯證有發汗後反惡寒陰陽兩虛為芍藥甘草附子湯證且有更發汗小發汗論中有論而無方亦可以意會之是為斡旋之法學者宜究心焉
