body:
  text: 卷二陽明篇陽明主裡外候肌肉內候胃中何謂陽明經症曰身熱目痛鼻乾不得眠反惡熱是也有未罷太陽已罷太陽之辨若兼見頭痛惡寒是太陽症未罷自汗脈緩宜桂枝湯項背強𠘧𠘧桂枝加葛根湯主之無汗脈浮宜麻黃湯項背強𠘧𠘧葛根湯主之若無頭痛惡寒但見壯熱口渴是已罷太陽為陽明經之本症宜白虎湯主之何謂陽明腑症曰潮熱譫語手足腋下濈然汗出腹滿大便硬是也有太陽陽明少陽陽明正陽陽明之辨本太陽病治之失法亡其津液致太陽之熱乘胃燥而轉屬陽明其症小便數大便硬傷寒論謂之脾約宜麻仁丸以上言太陽陽明之症也本少陽病治之失法亡其津液致少陽之邪乘胃燥而轉屬陽明為大便結燥傷寒論謂為大便難以蜜煎膽汁導之以上言少陽陽明之症也病人陽氣素盛或有宿食外邪傳入遂歸於胃腑傷寒論謂為胃家實宜以三承氣湯下之以上言正陽陽明之症也陽明在經未離太陽宜汗之既離太陽宜清之在腑審其輕重宜下之若在經絡之界汗之不可清之不可下之不可宜用吐法柯韻伯云除胃實症其餘如虛熱咽乾口乾口苦舌苔腹滿煩燥不得臥消渴而小便不利凡在胃之外者悉是陽明表症仲景制汗劑是開太陽表邪之出路制吐劑是引陽明表邪之出路使心腹之濁邪上出於口一吐則心腹得舒表裡之煩熱悉除矣煩熱既除則胃外清自不致胃中之實所以為陽明解表之聖劑內經云陽明之上燥氣治之所謂本也本之下中之見也見之下氣之標也又曰陽明不從標本從乎中見從中見者以中氣從化也又曰陽明為闔又熱病論曰二日陽明受之陽明主肉其脈挾鼻絡於目故身熱目痛而鼻乾不得臥也傷寒多發熱而此獨身熱者蓋陽明主肌肉身熱尤甚也邪熱在胃則煩故不得舒臥也傷寒論云問曰病有太陽陽明有正陽陽明有少陽陽明何謂也答曰太陽陽明者脾約是也本太陽病不解太陽之標熱合陽明之燥熱以致脾之津液為其所灼而窮約正陽陽明者胃家實是也燥為陽明之本氣燥氣太過無中見濕土之化而實少陽陽明者發汗利小便胃中燥煩而實大便難是也少陽之上相火治之少陽病誤發汗誤利小便則津液竭而相火熾盛胃中燥實而大便難矣陽明之為病胃家實也言陽明病雖有三者之分而其為胃家實則一也此節為陽明病之提綱沈堯封云胃家實言以手按胃中實硬也柯韻伯云不大便利便是胃家實尤在涇云凡傷寒腹滿便閉潮熱轉失氣手足濈濈汗出等證皆是胃家實三説不同均存之以互參問曰陽明外證云何答曰身熱肌肉蒸蒸然熱達於外與太陽表熱不同汗自出熱氣內盛濈濈然汗溢於外與太陽之自汗不同不惡寒外寒已解反惡熱裡熱已盛也沈堯封云此節合上一節為陽明證一內一外之提綱只因有胃家實之病根即現熱盛汗出之病證不惡寒反惡熱之病情必內外俱備方是陽明之的證陽明本燥而標陽若不得中見太陰之濕化其燥氣陽熱太盛則為胃家實之病故仲景以胃家實為此證提綱雖有太陽陽明正陽陽明少陽陽明之分而其為胃家實則一也且更合之外證自熱汗自出不惡寒反惡熱便知胃家實證有諸中而見諸外愈可定其為真陽明也其證雖有在表宜從汗解者須知汗出多脈微宜桂枝湯無汗而喘脈浮宜麻黃湯二者俱太陽證而屬之陽明者以其不頭痛項強故也若惡寒已罷二方必不可用且陽明提綱重在裡證所以論中以此條別作一章也至於陽明本證有自受證有轉屬證有邪盛證有正虛證有能食不能食證有寒冷燥熱證有從樞從開證有名同而實異源一而流分證治之者不得其緒如治絲而棼之也何謂自受病起於陽明本經自為之病其外證身熱汗自出不惡寒反惡熱為陽明病自內達外之表證其有得之一日不待解散而二日惡寒自罷即自汗出而發熱為風寒入於陽明本經之表證此陽明自受之大略也何調轉屬凡太陽病過汗亡其津液致胃中乾燥而轉屬者固多亦有本太陽病初得時發汗不徹太陽標熱之氣不能隨汗而泄即與陽明燥氣混為一家而轉屬者亦有發熱無汗嘔不能食其時即伏胃不和之病機不因發汗而自濈濈然汗出為轉屬者更有誤下而轉屬者此陽明病轉屬之大略也何以謂正虛本篇第十六節云陽明病不能食胃中虛冷攻其熱必噦言胃腑之虛也第十七節云脈遲食難用飽飽則微煩頭眩必小便難此欲作谷疸雖下之腹滿如故此言經脈之虛也第十八節云無汗身如蟲行皮中狀者虛故也此言皮腠之虛也論雖無方大抵不外溫補之法第二十六節云傷寒嘔多雖有陽明證不可攻之以嘔則胃氣虛雖有陽明實熱之證不可誤攻而致死此言胃氣虛不可下也第二十七節云心下硬滿者不可攻之攻之利遂不止者死論止言心下而不及腹止言硬滿而不兼痛且心下為陽明之膈膈實者腹必虛腹中之虛氣閉於陽明之部若誤攻之則穀氣盡而下利死矣此言真虛假實者不可下也第十八節云面合赤色不可攻之攻之必發熱色黃小便不利以陽明之脈上循於面不知熏解之法而誤攻之則變為發熱色黃小便不利等症此言外實內虛不可下也須知陽明證雖以胃家實為提綱惟不得中見太陰之濕化陽明愈實而中見愈虛前此注家不知從此發揮以致患陽明證者以白虎承氣枉死幾千萬人也何謂邪實論中陽明腑證皆熱邪為病然熱邪散漫於內外大渴大汗宜用白虎逐熱而生液熱邪結聚於腸胃潮熱譫語宜用承氣逐熱而蕩實二方均為陽明腑病而設誤用之便致殺人第四十一節三陽合病末一句云若自汗出者主用白虎湯可以得其大要而三承氣湯各有所主陽明證不吐不下雖胃氣不虛而胃絡上通於心可因其心煩一證而知其胃氣不和可與調胃承氣湯二十九節已有明文也至於大承氣證於其脈遲則知其陽邪盡入於裡陰又於其汗出不惡寒身重短氣腹滿而喘五者之中更取出里證最確者曰不惡寒而潮熱言熱邪盡入於胃必變身熱為潮熱也且於里證中而知其大便硬之最確者曰手足濈然而汗出言胃主四肢若大便已硬者必通身熱蒸之汗自斂而變為手足濈然之汗方為大承氣之的證否則不過燥屎不行只為小承氣證耳然而小承氣亦不可以輕用也不大便六七日欲知其有燥屎與否少與小承氣湯試之湯入腹中而轉失氣者可再用之若不轉失氣者此為胃氣之虛初硬後溏必致不能食而脹滿不能飲而作噦矣論中二十九節三十節三十一節當潛心體玩至於譫語諸家皆謂邪實然論中三十二節有實則譫語虛則鄭聲之分本節直視為精氣已奪喘滿為脾肺不交下利為脾腎不固此皆譫語虛脫之死候其餘自三十三節至四十三節實邪固多而亦不可概認為實邪之為病也張隱菴云凡譫語乃心主神氣內虛言主於心非關於胃胃燥譫語而用承氣乃胃絡不能上通於心胃氣清而脈絡能通之義仲景示以法不可泥於法也何謂能食不能食若中風則能食以風能鼓動陽明之氣也若中寒則不能食以寒能拒閉陽明之氣也中寒之旨詳於第十九節中風之旨詳於第二十節意以寒為陰邪而下行故無汗而小便利風為陽邪而上行故不惡寒而頭眩寒則嘔不能食風則能食寒則頭痛風則咽痛此陽明有風寒之別也何謂寒冷燥熱之分本篇第四十四節云脈浮而遲虛寒之脈也其雲表熱者陽明戊土不能下合少陰癸水而獨主乎外也其云裡寒者少陰癸水不能上合陽明戊土而獨主乎內也其云下利清穀者戊癸不合而下焦生陽不升也以四逆湯為主治第四十五節云胃中虛冷者言中焦土氣虛冷也其云不能食者中焦虛冷夫其消穀之用也其云飲水則噦者兩寒相得而為噦也論中未出方而理中湯堪為主治推之第六十節云食谷欲嘔者屬陽明也吳茱萸湯主之與此節亦互相發明也第四十六節云脈浮發熱者陽明燥熱在於經脈也其云口乾鼻燥者熱循經脈而乘於上焦也其云能食則衄者熱在經脈不傷中焦之胃氣此證正於能食而得熱在經脈之確證經脈熱甚得衄則熱有出路而解矣推之第六十節食谷欲嘔後半節云得湯反劇者屬上焦也上焦主火熱而言與此節亦互相發明也何謂從樞從開內經云太陽為開陽明為闔少陽為樞三經者不得相失也使陽明而終於闔則死矣然則何法以致其開一則從少陽之樞以轉之四十七節云下之後外熱手足溫不結胸心中懊憹飢不能食但頭汗出者是陽明闔其氣不交於上下也以梔子豉湯主之四十八節云發潮熱大便溏小便自可胸脅滿不去者是陽明闔其氣不涉於大小二便止逆於胸脅之間以小柴胡湯主之且小柴胡湯時醫止知為少陽之方而不知為陽明之要方也四十九節云陽明病脅下硬滿言不得少陽之樞則下焦不通而為不大便中焦不治胃氣不和而為嘔上焦不和火鬱於上其舌上現有白苔可與小柴胡湯上焦得通津液得下胃氣因和身濈然汗出而解所以從樞以轉之者此也一則從太陽之開以出之五十節陽明中風脈弦浮大而短氣共九十三字解詳淺注病過十日又當三陰受邪若脈續浮者知其不涉於陰仍欲從少陽之樞而出若脈但浮而別無餘症者是病機欲從太陽之開可與麻黃湯以助之若不尿腹滿加噦者是不從少陽之樞太陽之開逆於三陰為不治之證所謂從開以出者此也何謂名同而實異內經云人之傷於寒也則為熱病二日陽明受之其脈挾鼻絡於目所云身熱目痛鼻乾不得眠是止就陽明經病之一端而言仲景以胃家實提綱是該內外證治之全法而立論也後人妄用升麻葛根湯反發陽明之汗上而鼻衄下而便難是引賊破家矣此所謂名同而實則異也何謂源一而流分陽明原主氣而蓄血證則主血陽明原主燥而發黃證則合溫五十五節云陽明證其人喜忘必有蓄血屎雖硬大便反易其色必黑抵當湯主之七十五節云病人無表裡證發熱七八日雖脈浮數者可下之言病在陽明之絡絡則無涉於表裡也發熱而不惡寒下之所以泄其熱也假令已下脈浮已解而數不解知其熱不在氣而在血不在陽明之經而在陽明之絡論名合熱其合有二一合於中則為消穀善飢至六七日不大便其血必瘀於中宜抵當湯以攻之一合於下則為下利不止必協熱而便膿血雖未出方大抵溫劑不外桃花湯寒劑不外白頭翁湯之類同一陽明證而又有發黃者第二十一節云陽明病無汗小便不利心中懊憹者身必發黃二十二節云陽明病被火額上微汗出小便不利者必發黃此言濕熱鬱於中土也七十六節云傷寒發汗已身目為黃為寒濕在裡意者濕熱之黃可下而寒濕之黃不可下雖未出方大抵五苓散加茵陳蒿為近是七十七節云傷寒七八日身黃如橘子色小便不利腹微滿者茵陳蒿湯主之此言濕熱鬱於裡而為黃以大黃合茵陳蒿導之從小便出也七十八節云傷寒身黃髮熱者梔子柏皮湯主之言濕熱已發於外全無里證取柏皮以走皮以三味色黃以治黃也七十九節云傷寒瘀熱在裡身必發黃麻黃連翹赤小豆湯主之此言傷寒表證未解而濕熱瘀於裡而形於外藉麻黃以取微汗也此所謂源一而流則分也至於治法闔者恐其終闔實者慮其大實故以三承氣湯之重劑為主麻仁尤為潤下之輕劑也蜜煎導為外取之尤輕者也其調胃承氣湯方中芒硝上承火氣大黃下通地道不用朴實之破泄而用甘草之和中所以名為調胃也其小承氣湯專取通其燥屎故不用芒硝之上承火氣配不炙之枳朴而疏達壅滯多與為攻少與為和故名之曰小也若夫大承氣湯乃大無不該主承通體之火熱而下行凡血氣瘀滯聚邪宿食無不一掃而淨為下劑之最重者用之得法可以起死回生倘若一誤則邪去而正亦亡矣所以二十一節言欲與大承氣湯先少與小承氣湯若轉失氣為有燥屎方以大承氣湯攻之與三十六節言欲與大承氣湯即以小承氣湯為試其義相通詳於淺注若大便硬忽見外便數少以津液當還入胃中不久自下不必攻之詳於二十五節當細味之三十九節言汗出譫語以燥屎在胃中此為風也過經乃可下之下之若早語言必亂無非諄諄然不可輕下不可早下之意陶節庵云痞滿燥實堅五者全具方可用之此語雖曰未粹亦堪為鹵莽者腦後下一金針也然論中急下三條卻不在痞滿燥實堅五證第七十節云傷寒六七日目中不了了睛不和無表裡證大便難無里證故大便不硬但覺其難身微熱者無表證故身無大熱而止微熱此為實也急下之宜大承氣湯此言悍熱之氣上走空竅也七十一節云陽明病發熱汗多者急下之止發熱汗出無燥渴硬實之證而亦急下之者病在悍氣無疑矣宜大承氣湯此言悍熱之氣內出而迫其津液外亡也七十二節云發汗不解腹滿痛者急下之宜大承氣湯此言悍熱不上走於空竅而下循於臍腹也三者之外雖無急下之明文亦有不可姑緩者七十三節云腹滿不減減不足言當下之宜大承氣湯言在陽明無形之悍氣從肓膜而聚有形之胸腹又與陽明之本氣不同也蓋此證初患皆為病不甚重病家醫家往往不甚留意若讀過薛立齋張景嶽及老村學先生多閲八家書者為之主方其死定矣陽明篇此證甚為難治其餘各症皆可於本篇按法而施方治自無難事善讀者當自領之不能以筆楮罄也門人問曰時賢柯韻伯謂陽明表證身熱自汗不惡寒反惡熱此因內熱外發以梔子豉湯因勢吐之後人認不出陽明表證既不敢用麻桂又不知用梔豉必待熱深熱極始以白虎承氣投之是不知仲景治陽明之初法遂廢仲景之吐法立説甚超夫子以為何如曰梔子豉湯治心煩胸中懊憹不眠等證堪為陽明證初患未實者之要藥善用之自有左宜右有之妙但云因勢吐之是因前人之誤反失梔子豉湯立方之本旨且以瓜蒂散之湧吐亦移入陽明篇中更失之遠矣其自撰出上越中清下奪為治陽明三大法試問陽明篇何嘗有湧吐之條乎門人又問曰發汗利小便為陽明之大禁然乎否乎曰此為正論但不可泥矣五十二節五十三節麻黃桂枝二湯已有明文且五十八節桂枝湯與大承氣湯為一表一里之對峙以脈實宜下脈浮虛宜汗六十二節病人不惡寒而渴者此轉屬陽明也小便數者大便必硬不更衣十日無所苦也渴欲飲水少少與之但以法救之渴者宜五苓散意者十日無所苦承氣湯既不可用飲水亦不至數升白虎加人參湯又非所宜惟以五苓散助脾氣以轉輸多飲暖水以出汗則內外俱松矣讀此可知禁汗為正治之法而發汗原為除熱以存津液起見亦為權宜之法也四十三節云若脈浮發熱渴欲飲水小便不利者豬苓湯主之意者利水之中寓以育陰不失陽明之治法而後半節又云陽明病汗出多而渴者不可與豬苓湯以汗多胃中燥豬苓湯復利其小便故也讀此可知利水原為清火以存津液起見是為權宜之妙用若汗出不多者可與汗出多者不可與以汗之與溺同出而異歸權宜中仍以正治之法為重也
