body:
  text: 卷六厥陰篇厥陰為風木之臟從熱化者多從寒化者少以木中有火故也何謂厥陰症傷寒論云厥陰之為病消渴火盛氣上撞心氣逆即火逆也心中疼熱火邪入心飢火能消物也而不欲食木剋土也食則吐蛔蟲為風化一聞食臭則上入於膈而吐出下之利不止誤下傷胃氣是也厥陰為兩陰交盡宜無熱症然厥陰主肝而膽藏於內則厥陰熱症皆少陽之火內發也要知少陽厥陰同一相火相火鬱於內是厥陰病相火出於表為少陽病少陽咽乾即厥陰消渴之機胸脅苦滿即氣上衝心之兆心煩即疼痛之初不飲食是飢不欲食之根喜嘔即吐蛔之漸故少陽不解轉屬厥陰為病危厥陰病衰轉屬少陽為欲愈烏梅丸為厥陰證之總方吐蛔久利者尤宜病初起手足厥冷脈微欲絶宜當歸四逆湯有久寒加生薑吳萸酒水各半煎以相火寄於肝經雖寒而臟不寒故先厥者後必發熱手足愈冷肝膽愈熱故云厥深熱亦深也薑附不可妄投脈結者脈緩時一止曰結活人云陰盛則結代者一臟氣敗其脈動而中止不能自還而他臟代之心動悸心氣不寧炙甘草湯主之按他經亦有此症是陽氣大虛虛極生寒非薑附肉桂不為功若用此藥是速其死也惟厥陰症肝中之相火本少陽之生氣而少陽實出坎中之真陰即經所謂陽為之正陰為之主是也按前言表證而手足厥逆此言里證而脈結代雖為厥陰寒化終不用薑附大熱之品以厥陰之臟相火遊行於其間故也脈微欲絶不可下若脈滑而厥是內熱鬱閉所謂厥應下是也下之是下其熱非下其實泄利下重者四逆散欲飲水數升者白虎湯皆所以下無形之邪也若以承氣下之則不止矣熱利下重者白頭翁湯主之下利欲飲水者熱也白頭翁湯主之以上治熱化之法也厥者必發熱熱與厥相應熱深厥亦深熱微厥亦微此四症是厥陰傷寒之定局先熱後厥厥熱往來厥多熱少熱多厥少此四症是厥陰傷寒之變局皆因其人陽氣多少而然乘脾乘肺二症宜辨曰傷寒腹滿經云諸腹脹大皆屬於熱此由肝火也譫語經云肝氣盛則多言寸口脈浮而緊緊即弦脈此肝乘脾也名曰縱刺期門曰傷寒發熱嗇嗇惡寒肺主皮毛因無頭痛項強非屬太陽病為肺虛渴欲飲水無白虎證之欲飲亦為肺虛腹滿無承氣證因肺虛不能通調水道此肝乘肺也肺金虛不能制木肝寡於畏侮所不勝也名曰橫刺期門肝有亢火隨其實而瀉之傷寒陽脈澀陰脈弦法當腹中急痛此亦肝乘脾也先與小建中湯平肝以補脾不瘥者中氣虛而不振邪尚流連與小柴胡湯主之令木邪直走少陽使有出路所謂陰出之陽則愈也傷寒厥而心下悸者宜先治水當服茯苓甘草湯卻治其厥不爾水漬入胃必作利也此亦肝乘肺也雖不發熱惡寒亦木實金虛水氣不利所致上節腹滿是水在中焦故刺期門以泄其實此水在上焦故用茯苓甘草湯以發其汗此方是化水為汗發散內邪之劑即厥陰治厥之劑也內經云厥陰之上風氣治之所謂本也本之下中之見也見之下氣之標也又曰厥陰不從標本而從中見也又曰厥陰為闔又熱病論曰傷寒六日厥陰受之厥陰脈循陰器而絡於肝故煩滿而囊縮厥陰木氣逆火氣盛故煩滿循陰器故囊縮蓋厥陰以風木為本以陰寒為標中見少陽厥陰為陰極故不從標本而從中見也本論以厥陰自得之病為提綱故先曰消渴氣上撞心心中疼熱飢而不欲食食則吐蛔下之利不止等證然必合之外證有厥熱往來之氣化或嘔或利方為真厥陰其餘或厥或利或嘔內無氣上撞心心中疼熱等症皆似厥陰而非厥陰也其云消渴者消為風消渴為木火上熏也其雲氣上撞心者木氣上凌心包也其云心中疼熱者是其氣甚即為火火甚即生熱陰血受灼不足榮養筋脈故筋脈不舒而疼胃液受灼故飢其云不欲食者是木氣橫逆也其云食則吐蛔者蛔感風木之氣而生聞食臭則出濕熱腐成居於胃底無食則動胃寒則出胃熱亦出下之利不止者陰寒在下也二章一節云厥陰中風脈微浮為欲愈不浮為未愈陰經受邪脈當沉細今反浮者以風為陽邪元氣復而邪將散故脈見微浮不浮則邪深入不外散故為未愈二節言欲愈之時蓋少陽旺於寅卯解於此時者中見少陽之化三節厥陰陰之極渴欲飲水水為天一所生之水以水濟火陰陽氣和而病自愈提綱後止此三節提出厥陰病其餘則曰傷寒曰厥曰下利而不明言厥陰病以厥陰從中見而不從標本也三章一節曰諸四逆厥者不可下之虛家亦然總起下文諸節厥逆之意亦以承上文下之利不止夫四逆厥者咸藉生陽之來復故不可下非特陽氣大虛寒邪直入即熱深者亦間有之熱盛於內內守之真陰被爍幾亡不堪再下以竭之故申其戒曰氣血兩虛之家即不厥逆亦不可下也二節言陰陽寒熱互換之理厥陰傷寒先厥後發熱而利必自止厥不再作利亦不再下若見厥則復利三節言寒熱勝復之理而歸重於胃氣也凡厥利當不能食今反能食者恐中氣除去求救於食當以索餅試之若胃氣能勝穀氣而相安則不暴然發熱恐暴熱來驟而去速也本發熱六日厥反九日復發熱三日熱與厥無太過不及故期旦日夜半愈若再發熱三日兼之脈數此中見太過熱氣有餘必發癰膿也總之厥利轉為發熱乃屬愈期仲師不是要其有熱要其發熱而厥利止厥利止而熱亦隨罷方為順候若熱氣有餘則傷血分而化為如癰之膿非發癰也數脈為熱氣有餘遲脈為寒氣不足傷寒六七日陰盡出陽可望其陽復與黃芩湯復除其熱熱除內外皆寒腹中應冷當不能食今反能食此中氣已除必死此節因脈數而推及脈遲反復以明其義五節言熱化太過火熱下行則便膿血火熱上升則咽痛而為喉痹隨其經氣之上下而為病也傷寒先厥後發熱下利必自止而反汗出陰液泄於外而火熱炎於上必咽中痛其喉為痹發熱無汗而利必自止發熱無汗而利不止則陽熱陷下必便膿血火熱下行故其喉不痹第六節遙承諸四逆厥者不可下恐泥其説也傷寒一二日至四五日而厥者必發熱也是先厥後發熱也前熱者後必厥是先熱後厥厥之日期深者則發熱亦深厥之日期微者則發熱亦微厥應下之前不可下指承氣等方此應下熱證輕有四逆散重有白虎湯寒症有烏梅丸是也沈堯封云厥陰乃正邪分爭一大往來寒熱厥深熱深厥微熱微言寒熱輕重論其常理其有不然亦以決病之進退矣厥陰為三陰之盡病及此必陰陽錯雜厥陰肝木於卦為震一陽居二陰之下是其本象病則陽泛於上陰伏於下而下寒上熱之證作矣其病藏寒蛔上入膈是下寒之證據也消渴心中疼熱是上熱之症據也況厥者逆也下氣逆即是孤陽上泛其病多升少降凡吐蛔氣上撞心皆是過升之病治宜下降其逆上之陽取內經高者抑之之義其下之法非必硝黃攻克實熱方為下劑即烏梅丸一方已具方中無論黃連烏梅黃柏苦酸鹹為下降藥即附子直達命門亦莫非下降藥也下之而陽伏於下則陰陽之氣順而厥可愈倘誤認為外寒所束而反發其汗以心中疼熱之陽盡升於上而口傷爛赤矣以厥陰之脈循頰裡環唇內故也七節言厥熱相應陰陽平當自愈八節云凡厥者陰陽氣不相順接便為厥厥者手足逆冷是也觀以凡字冠首不獨言三陰之厥並該寒熱二厥在內矣蓋陽受氣於四肢陰受氣於五臟陰陽之氣相貫如環無端若寒厥則陽不與陰相順接熱厥則陰不與陽相順接也或曰陰不與陽相順接當四肢煩熱何反逆冷也不知陽邪熱邪深入陽氣壅遏於裡不能外達於四肢亦為厥豈非陰與陽不相順接之謂乎九節以惟陰無陽之臟厥托出陰陽不和之臟寒為蛔厥傷寒脈微而厥至七八日膚冷其人躁無暫安時者此為臟厥夫少陰水火不交則為煩躁若真陽欲脫則但躁不煩與厥陰之但煩不躁者不同蛔厥者其人當吐蛔今病者靜而復時煩此為臟寒蛔上入膈故煩須臾復止得食而嘔又煩者蛔聞食臭出其人當自吐蛔蛔厥者烏梅丸主之又主久利方吐蛔言其常不吐蛔而嘔煩風木之動亦可以吐蛔例也金匱云腹中痛其脈當沉而弦今反洪大故有蛔蟲蛔蟲之病令人吐涎心痛發作有時毒藥不止者甘草粉蜜湯主之蓋腹痛脈多伏陽氣內閉或弦則邪氣入中也今反洪大是蛔動而氣厥也吐涎吐出清水心痛痛如咬齧時時上下也蛔飽而靜其痛立止蛔飢求食其痛復發也十節十一節言厥陰必藉少陽少陰之樞轉樞轉不出逆於陰絡而為便血樞轉不出逆於膀胱關元而為冷結厥陰傷寒熱少厥微指頭寒默默不欲食煩躁數日小便利下利色白此熱除欲得食其病為愈若少陰樞轉不出故厥而嘔少陽樞轉不出胸脅煩滿者陰陽並逆不得外出內傷陰絡其後必便血熱邪內陷為便血寒邪內陷則手足厥冷言我不結胸胸在上而主陽腹在下而主陰各從其類故少腹滿以厥陰之脈過陰器抵少腹按之則痛此冷結在膀胱關元也十二十三節言陰陽勝負可以日數之多寡驗之厥少熱多陽氣太過陰血受傷其後必便血以厥陰主包絡而主血寒多熱少陰氣盛而陽氣退其病為進人之傷於寒則為熱病熱雖甚不死是傷寒以熱為貴然熱不及者病太過者亦病故此二節論寒熱之多少以明不可太過與不及也仲師以熱多為病愈厥多為病進者是論病機之進退以厥為熱邪向內熱為熱邪向外非內來客熱向外為退向內為進也故熱多為病邪向愈之機不是病邪便愈之候所以縱有便膿血之患而熱迫榮陰與熱深厥逆者仍有輕重也厥陰有不治之死證不可不知傷寒六七日脈微手足厥冷虛陽在上不得下交於陰故煩真陰在下不能上交於陽故躁此陰陽水火不交宜灸厥陰以啓陰中之生陽而交會其水火若厥不還則陽氣不復陰氣乖離故死厥不還者死則知發熱為厥陰之生機然發熱亦有三種死證傷寒發熱當利止而反下利身雖熱而手足反見厥逆孤陽外出獨陰不能為之守更加躁不得臥陰盛格陽主死傷寒發熱下利至甚厥不止者即無躁不得臥亦主死金匱云六腑氣絶於外者手足寒五臟氣絶於內者利下不禁臟腑氣絶故主死傷寒六七日不利若發熱而渴汗濈濈而微利是陽復之證倘熱汗下三者一時並見乃真陽之氣虛脫於內為利浮散於外為熱發越於上而為汗主死亡陽有死證亡陰亦有死證傷寒五六日不傷於氣而傷於血故不結胸不結胸則腹亦不硬而濡軟傷於血則脈虛血虛於內不能與陽相接於外故手足復厥厥不為熱深而為亡血下之愈亡其陰故死發熱而厥至七日六氣已周來復於太陽則應止今不惟不止而反下利陰盛雖未至於死亦為難治五章凡八節皆論厥證有寒有熱有虛有實也陽盛則促雖手足厥逆亦是熱厥忌用火攻然有陰盛之極反假現數中一止之促但陽盛者重按之指下有力陰盛者重按之指下無力傷寒脈促知其陽盛之假手足厥冷知其陰盛之真可於厥陰並榮經俞等穴灸之以啓其陷下之陽此厥陰證之寒也傷寒脈滑而厥者陽氣內郁不能外達外雖厥而里有熱白虎湯主之脈微而厥為寒厥脈滑而厥為熱厥陽極似陰全憑脈以辨之然必煩渴引飲不大便乃為里有熱也經脈流行營周不息經血虛少不能流通暢達手足厥寒脈細欲絶者當歸四逆湯主之若其人內有久寒加吳萸生薑厥陰肝臟藏榮血以應肝木膽腑內寄風火同原苟非寒邪內犯一陽生氣欲寂者不得用大辛大熱之品以擾動風火不比少陰為寒水之臟其在經之邪可與麻辛附子合用是以雖有久寒不現陰寒內犯之候者加生薑以宣泄不取乾薑之溫中加吳萸以苦降不取附子之助火分經投治法律精嚴學者所當則效也經脈內虛而厥有當歸四逆湯之治而陽虛之厥反作假熱又當何如大汗出謂如水淋漓熱不去謂熱不為汗衰蓋言寒氣外泄寒邪獨盛表虛邪盛勢必失和有內拘急四肢疼之證再見下利厥逆陰寒內盛惡寒陽氣大虛故用四逆湯溫經復陽以消陰翳大汗身熱四肢疼皆是熱邪為患而仲師便用四逆湯者以外有厥熱惡寒之證內有拘急下利之候陰寒畢露則知汗出為陽氣外亡身熱由虛陽外泄肢冷為陽氣內脫其辨證又只在惡寒下利總之仲師辨陽症以惡熱不便為裡實上節陽虛有假熱此節陽虛無假熱大汗若大下利而厥冷者四逆湯主之汗而云大陽氣亡於表下利云大陽氣亡於裡加以厥冷何不列於死證玩本文不言五六日六七日可知乃陰寒驟中邪氣雖盛正氣初傷急溫正氣猶能自復故用四逆湯勝寒毒於瀕危回陽氣於將絶汗利止厥回可望生全不因汗下而厥冷用當歸四逆湯因汗下而厥冷用四逆湯此緩急之機權也此證無外熱相錯為陰寒之證易明然云大汗大下則陰津亦亡此際救陽為急陽回亦當徐救其陰也亦有因痰水而致厥者病人無他證手足厥冷四肢受氣於胸中因痰飲結聚斯氣不能通貫於四肢脈乍緊者痰脈怪變無常不緊而忽緊忽緊而又不緊邪結在胸中胸者心主之宮城心為邪礙心下滿而煩飢不欲食病在胸中當須吐之宜瓜蒂散即內經所謂高者引而越之之意再言水厥傷寒厥而心下悸宜先治水當服茯苓甘草湯卻治其厥不爾水漬入胃必作利也此厥陰病預防下利之法病至厥陰以陽升為欲愈邪陷為危機厥而下利則中氣不守邪愈內陷此條厥而心下悸水邪乘心心陽失御見此則治厥為緩而治水為急何也厥猶可從發熱之多少以審進退之機水必趨於下而力能牽陽下墜故也傷寒六七日大下後寸脈沉而遲手足厥冷下部脈不至咽喉不利唾膿血泄利不止為難治麻黃升麻湯主之寸脈氣口也氣口獨為五臟主胃陽衰而寸脈沉遲也四肢為諸陽之本陽虛故手足厥冷下後陽虛故下部脈不至下寒則熱迫於上故咽喉不利而吐膿血也即前所謂厥後熱不除者必便膿血熱氣有餘必口傷爛赤泄利不止寒邪在下正虛邪實陰盛陽衰寒多熱勝表裡舛錯治寒則遺其熱治熱則遺其寒補虛必助其實瀉實必助其虛誠為難治六章十八節皆統論厥陰下利有寒熱虛實陰陽生死之不同傷寒四五日腹中痛若轉氣下趨少腹者厥陰陰寒內合太陰由太陰而仍歸厥陰下而不上此欲自利也傷寒本自寒下醫復吐下寒格更逆吐下若食入口即吐乾薑黃連黃芩人參湯主之其人本從於寒而下利復吐下之下因下而愈寒上因吐而愈熱寒熱相阻而成格症非寒熱相結而成痞症不食則不吐是心下無水故不用薑夏以乾薑辛溫除寒下而辛烈又能開格納食也下利有微熱而渴脈弱者今自愈此言得中見之化也下利脈數有微熱汗出今自愈設復緊得厥陰之氣矣故為未解下利手足厥冷無脈者陽陷下不得橫行於手足又不能充達於經脈也灸之不溫若脈不還反微喘是根氣絶於下陽氣脫於上故死少陰負趺陽者為順也負承也趺陽乃陽明胃脈言少陰之氣得上承陽明則陰氣生而脈還陽氣復而得溫故為順也下利陽氣下陷其脈當沉陰氣內盛其脈當遲今不沉遲而寸脈反浮數是熱傷心包尺中自澀者下利陰血虛也陽盛血虛迫血下行必清膿血上節言陰盛傷陽此節言陽盛傷陰下利清穀藏氣虛寒不可攻表汗出則表陽外虛里陰內結故必脹滿經云臟寒生滿病下利脈沉弦則少陽初之氣下陷下重是火邪下逼若陽熱甚而脈大而非初陽之脈象為未止脈微弱為陰數為陽乃陰中有陽為欲自止內經有身熱則死之説而此得少陽中見之化為陰出陽雖發熱不死厥陰陰寒下利脈沉而遲其人面少赤三陽之氣上循頭面陽格於上喜得少陽之熱化身有微熱然而下利清穀者厥陰之標陰全陷於下陽熱在上陰寒在下兩不相接惟取少陰篇大方救之從陰出陽必鬱冒汗出而解病人必微厥所以然者其面戴陽下虛故也下利脈數而渴者今自愈設不瘥必清膿血以有熱故也言當愈不愈必熱傷心包絡而便膿血申明所以便膿血者以脈數而渴內有熱故也下利後脈絶下焦生氣不升手足厥冷中焦土氣不和晬時環轉一周脈還手足溫者中土之氣將復復能從中焦而注於手太陰故生脈不還者中土已敗生氣已絶雖手足不逆冷亦主死此言生死之機全憑脈息而脈之根又藉於中土也諸節皆言下利此節獨言下利後則與少陰下利而頭時時自冒者同意利後似乎邪去殊不知正氣與邪氣俱脫之故晬時脈還手足溫陽氣尚存一線猶可用四逆白通等法以救將絶之陽也傷寒下利日十餘行病在厥陰而三陽三陰之氣皆虛脈反實者無胃氣柔和之脈乃真元下脫故死谷入於胃藉中土之氣變糟粕猶奉心化赤厥陰標陰氣盛入胃不能變化精微蒸津液而泌糟粕清濁不分下利清穀裡寒外熱汗出而厥者通脈四逆湯主之此言里不通於外而陰寒內拒外不通於里而孤陽外越非急用大溫之劑必不能通陰陽之氣於頃刻厥陰標陰病則為下利清穀厥陰中見得病則為熱利下重者白頭翁湯主之內經所謂暴注下迫皆屬於熱也下重者厥陰經邪熱入下於大腸之間肝性急速邪熱甚則氣滯壅塞其惡濁之物急欲出而不得故下重也下利腹滿身體疼痛先溫其里乃攻其表溫里宜四逆湯攻表宜桂枝湯臟寒生滿病水穀之氣下行陰寒之氣上逆故先溫其裡寒後去其表寒也下利欲飲水者以有熱故也白頭翁湯主之此申明白頭翁湯能清火熱以下降而引陰液以上升也下利讝語者中是火化與陽明燥氣相合胃氣不和有燥屎也厥陰忌下有燥屎不得不下宜小承氣湯微和胃氣下利後更煩水液下竭火熱上盛按之心下濡者非上焦君火充盛之煩乃下焦水陰不得上濟之煩此為虛煩宜梔子豉湯嘔家有癰膿者熱傷包絡血化為膿也腐穢欲去而嘔不可以辛散之品治嘔反逆其機熱邪內壅無所泄矣俟膿盡則熱隨膿去而自愈此章四節俱厥陰之嘔有血氣寒熱虛實之不同也嘔而脈弱裡氣大虛小便復利氣機下泄身有微熱見厥者陰陽之氣不相順接上者自上下者自下有出無入故為難治四逆湯主之乾嘔吐涎沫頭痛者吳茱萸湯主之此言厥陰陰寒極盛津液為寒氣絆迎而上所嘔皆涎沫而無飲食痰飲而且逆行巔頂而作頭痛非大劑不能治此暴劇之證方中無治頭痛之藥以頭因氣逆上衝止嘔即所以治頭痛也嘔而發熱者小柴胡湯主之厥陰與少陽為表裡邪在厥陰惟恐厥逆下利若見嘔而發熱是臟邪還腑自陰出陽無陰邪變逆之患矣故當從少陽之樞而治之傷寒以胃氣為本不獨厥陰然也厥陰不治取之陽明尤為要法傷寒大吐大下之極虛復極汗出則外亦極虛虛則氣少不能交通於內其人外氣怫鬱恰似外來之邪怫鬱於表誤認為邪熱復與之水以發其汗因得噦所以然者胃中寒冷故也傷寒噦而腹滿視其前後知何部不利利之則愈噦既有虛寒之症亦有實熱之症厥陰之經抵少腹挾胃上入頏顙凡噦厄之氣必從少腹而起由胃而上升於咽嗌故也夫傷寒至噦非中土敗絶即胃中寒冷然亦有裡實不通氣不得下泄反上逆而為噦者玉機真藏論云脈盛皮熱腹脹前後不通悶瞀此謂五實身汗得後利則實者活今噦而腹滿前後不利五實之二實也實者瀉之視其前後二部利之則氣得通下泄而不上逆噦即愈矣夫以至虛至寒之噦症亦有實者存焉凡實熱之證亦有虛者在矣視其寒熱虛實而施溫涼補瀉則人無夭扎之患矣
