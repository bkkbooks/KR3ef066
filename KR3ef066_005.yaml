body:
  text: 卷五少陰篇少陰腎中水火同具邪傷其經或從水化而為寒或從火化而為熱二症俱以脈沉細但欲寐為提綱何謂少陰之邪從水化而為寒曰脈沉細而微但欲寐背惡寒口中和腹痛下利清穀小便白是也宜用回陽法而回陽中首重在溫劑又有交陰陽微發汗共成三法少陰病寒邪始傷是當無熱而反發熱為太陽之標陽外呈脈沉為少陰之生氣不升恐陰陽內外不相接故以熟附助太陽之表陽而內合於少陰細辛啓少陰之水陰而外合於太陽仲景麻黃附子細辛湯非發汗法乃交陰陽法以上言交陰陽法也少陰病自始得以至於二三日俱無里症可知太陽之表熱非汗不解而又恐過汗以傷腎液另出加減法取中焦水穀之津而為汗則內不傷陰邪從表解矣仲景麻黃附子甘草湯變交陰陽法而為微發汗法以上言微發汗法也手足厥冷吐利小便復利下利清穀內寒外熱脈微欲絶者宜四逆湯裡寒外熱面赤或腹痛或乾嘔或咽痛或利止脈不出或出而厥宜通脈四逆湯少陰下利宜白通湯利不止厥逆無脈乾嘔煩白通加豬膽汁湯主之服藥後脈暴出者死微續者生汗下後不解煩燥者茯苓四逆湯主之少陰病二三日不已至四五日腹痛小便不利四肢沉重疼痛自下利此為水氣宜真武湯咳嘔小便利下利四症或有或無因症下藥當於淺注細玩之少陰病得之二三日口中和其背惡寒者太陽之陽虛不與少陰之君火相合當灸之又身體痛君火之氣不能周遍於一身手足寒君火之氣不能充達於四肢骨節痛君火之神機不能遊行以出入脈沉者君火之神機不能自下而上一為陽虛責在太陽之陽氣虛不能內合一為陰虛責在少陰之君火內虛神機不轉皆以附子湯主之少陰病吐利神機不能交會於中土手足逆冷中土氣虛不能達於四肢煩躁欲死者少陰神機挾寒而逆於經脈心脈不能下交於腎則煩腎脈不能上通於心則躁吳茱萸湯主之以上用溫劑法也何謂少陰之邪從火化而為熱曰脈沉細而數但欲寐而內煩外躁或不臥口中熱下利清水小便赤是也宜用救陰法而救陰中又有補正攻邪之異少陰病二三日咽痛者可與甘草湯不瘥與桔梗湯少陰病咽中傷生瘡不能語言聲不出者苦酒湯主之少陰病咽中痛半夏散及湯主之少陰病下利咽痛胸滿心煩者豬膚湯主之少陰病得之二三日以上心中煩不得臥黃連阿膠湯主之少陰病下利六七日咳而嘔渴心煩不得眠者豬苓湯主之少陰病二三日至四五日腹痛小便不利下利便膿血桃花湯主之以上皆以補正為救陰法也少陰病得之二三日口燥舌乾者急下之宜大承氣湯熱淫於內因而轉屬陽明胃火上炎故口燥舌乾急下之穀氣下流津液得升矣少陰病六七日腹脹不大便者急下之宜大承氣湯得病六七日當解不解津液枯涸因轉屬陽明故腹脹不大便宜於急下者六七日來陰虛已極恐土實於中心腎不交而死也少陰病自利清水色純青心下必痛口乾燥者急下之宜大承氣湯是土燥火炎脾氣不濡胃氣反厚水去而谷不去故宜急下以上皆以攻邪為救陰法也內經云少陰之上火氣治之所謂本也本之下中之見也見之下氣之標也又曰少陰從標從本又曰少陰為樞又熱病論曰五日少陰受之少陰脈貫腎絡於肺系舌本故口燥舌乾而渴傷寒論曰少陰之為病脈微細但欲寐也微者體薄而不厚也為手少陰神病細者形窄而不寬也為足少陰精病病在陰則欲寐在陽則不得寐故曰但欲寐此為樞象少陰證之總綱也柯韻伯云少陽為陽樞少陰為陰樞樞機不利故欲寐與少陽喜嘔嘔者欲出陽主外也寐者主入陰主內也喜嘔是不得嘔欲寐是不得寐皆在病人意中得樞機之象如此又云但欲寐即是不得眠然但欲寐是病情乃問而知之不得眠是病形可望而知之欲寐是陰虛不得眠是煩躁故治法不同按少陰本熱而標寒其病或從本而為熱化或從標而為寒化與太陽一例第一節言微細之病脈但欲寐之病情兼水火陰陽標本寒熱而提其總綱也以下共四十四節皆本此而立論然他經提綱皆是邪氣盛則實少陰提綱俱指正氣奪則虛以少陰為人身之根本也所以第二節即言上火下水虛而未濟第三節即言外陽內陰虛而不交第四節第五節又言不可發汗第六節又就脈而言不可下無非著眼於虛之一字而以根本為重也今再詳第二節原文云少陰病欲吐不吐心中煩但欲寐三句指初病時水火不濟已具樞病之象又云五六日自利而渴屬少陰也虛故引水自救四句方指出五六日為少陰主氣之期火不下交則自利水不上交而作渴屬少陰之虛為寒熱俱有之證又云若小便色白者少陰病形悉具小便白者以下焦虛有寒不能制水故令色白也六句分出小便色白始為少陰陰寒之病形悉具言外見少陰熱化之病邪熱足以消水其小便必赤此寒熱之幾微當辨也其第三節原文云病人脈陰陽俱緊反汗出者亡陽也此屬少陰四句以諸緊為寒陰不得有汗今反汗出此屬少陰陰盛於內陽亡於外陰陽不交之故也又云法當咽痛而復吐利二句以陰陽不交則陽自陽而格絶於外其咽痛為假熱之象陰自陰而獨行於內其吐利為真寒之證此寒熱之真假當分也其第四節原文云少陰病咳而下利譫語者被火氣劫故也小便必難以強責少陰汗也六句言少陰上咳下利之證被火則精竭神越而譫語小便必難戒其勿發少陰汗慮其虛也其第五節原文云少陰病脈沉細數病為在裡不可發汗三句言少陰自有表裡脈沉而發熱為少陰表有麻黃附子細辛湯法脈細而沉數而不發熱為少陰里不可發汗其第六節云少陰病脈微不可發汗亡陽故也陽已虛尺脈澀弱者復不可下之六句言脈微為亡陽不可發汗以傷陽若兼見尺脈弱澀為亡陰更不可復下以傷陰自第二節至此皆著眼於虛之一字以立論也請再言欲愈之證第七節大旨以脈緊為寒至七八日緊去而發煩自下利脈微手足溫此少陰之寒得陽明之熱為戊癸之合化而愈也第八節大旨下利自止得手足溫之吉候雖惡寒蜷臥而可治以其得中土之氣而愈也第九節提出自煩欲去衣被雖惡寒而蜷可治以得君火之氣而可治也第十節少陰中風風為陽邪陽寸應浮陰尺應沉大旨以陽得微而外邪不復入陰得浮則內邪從外出而欲愈言外見中風而可推及傷寒矣第十一節言少陰病欲解時從子至寅時上二句指出陽生於半子而病解並結上數節少陰得陽則解之義也雖貴得陽陽者太陽之標陽也既知得標陽之熱化則生亦當知熱化太過而亦成病第十二節云少陰病吐利手足不逆冷反發熱者不死言少陰而得太陽之標陽也又云脈不至灸少陰七壯言不得太陽標熱之化而下陷灸之以啓在下之陽也第十三節云少陰病八九日一身手足盡熱者以熱在膀胱必動便血也言少陰熱化太過移於膀胱膀胱主外為一身發熱膀胱為胞之室胞為血海熱邪內干而為便血也第十四節云少陰病但厥無汗熱化太過而行於里而為厥若強發之必動其血未知從何道出或從口鼻或從目出是名下厥上竭為難治言少陰熱化太過而厥誤汗反增其熱蓋主內經厥論起於足下以陽氣起於足五趾之裡今誤發少陰汗激動少陰熱化之邪自下逆上名曰厥少陰原為少血之藏動其陰血而脫出名曰上竭為難治之證若夫不得太陽標陽則為陰寒之症不止難治而為不治之死證自第十五節以及第二十節各有妙義第十五節云少陰病惡寒身蜷而利手足逆冷者不治蓋以少陰之脈起足心至俞府行身之前外呈而為寒內陷而為利真陽絶不行於手足而為逆冷此言少陰之寒不得太陽標陽之死證也第十六節云少陰病吐利躁煩四肢逆者死蓋少陰上下水火陰陽之氣全賴中土以交合今吐利躁煩陰陽水火之氣頃刻離決四肢逆冷土氣已絶此言少陰不得中土之交之死證也第十七節云少陰病下利止而頭眩時時自冒者死蓋以陰竭於下而利止陽亡於上而眩冒為死證利不止而眩冒更為死證言陰陽不得倚附也第十八節云少陰病四逆惡寒而身蜷脈不至不煩而燥者死此言少陰有陰無陽之死證也第十九節云少陰病六七日息高者死此言少陰生氣上脫之死證也第二十節云少陰病脈微細沉但欲臥汗出不煩自欲吐此十一字為一截言少陰陰寒恆有之脈證也其云至五六日自利復煩燥不得臥寐者死此十五字又為一截少陰病以五六日為生死之關若至五六日云云是真寒反為假熱陽被陰迫而飛越此言少陰陽氣外脫之死證也自章首至此凡二十節論少陰證之全體已備但未詳其標本寒熱陰陽水火神機樞轉上下出入之理自二十一節至四十三節發明其旨而並出其方讀者不可一字放過此又少陰之大用也曷言標本少陰標寒而本熱與太陽本寒而標熱為雌雄表裡之相應二十一節云少陰病始得之反發熱脈沉者麻黃附子細辛湯主之言少陰脈沉不當發熱今反發熱是太陽標陽陷於少陰而為熱宜以此湯交和其內外也二十二節云少陰病得之二三日麻黃附子甘草湯微發汗以二三日無里證故微發汗也言二三日值少陽主氣之期陰樞藉陽樞之力可用此湯微發其汗又申之曰以二三日無少陰之裡證止見太陽之表證故也要知太陽陽虛不能主外內傷少陰之氣便露出少陰底板少陰陰虛不能主內外傷太陽之氣便假借太陽之面目所以太陽病而脈反沉用四逆以急救其里少陰病而表反熱用麻辛以微解其表此表裡輕重兩解法也故始得之不發汗得之二三日微發汗用細辛非發汗用甘草乃發汗此旨不可與淺人語也然二十一節二十二節合臟腑雌雄而淺深言之二十三節二十四節二十五節就少陰本經分標本而對待言之其云少陰病得之二三日以上心中煩不得臥黃連阿膠湯主之言少陰本熱之病二三日隨三陽主氣之期而化熱此少陰本熱之證也其云少陰病得之二三日口中和其人皆惡寒者當灸之附子湯主之言少陰君火之用弗宣病在上焦陽中之陽為陽虛其云少陰病身體痛手足寒骨節痛脈沉者附子湯主之言少陰生陽之氣不用病在下焦水中之陽為陰虛主以附子湯面面俱到此少陰標寒之證也然亦本熱之證不病無形之氣化而病有形之經脈者二十六節云少陰下利便膿血者桃花湯主之二十七節云少陰病二三日至四五日腹痛小便不利便膿血者桃花湯主之二十八節云少陰病下利便膿血者可刺此言本熱病在經脈者宜用石藥而濟以期門刺法便膿血亦熱入血室之義也又有標寒之證病發於手足之少陰而實本於陽明之中土者二十九節云少陰病吐利手足厥冷煩躁欲死者吳茱萸湯主之此從少陰而歸重到陽明以百病皆以胃氣為本傷寒證重之少陰證尤重之總結上文數節之義少陰證雖有標本寒熱之不同而著眼不離乎此首節至此作一大段讀然而少陰上火下水而主樞也主樞則旋轉無有止息第三十節云少陰病下利火不下交而下寒咽痛水不上交而上熱胸滿心煩者上下神機內鬱而樞轉不出為煩滿豬膚湯主之此上下而合言也第三十一節云少陰病二三日咽痛者少陰從心系之脈而挾咽可與甘草湯不瘥者與桔梗湯此言水不上交而為痛也第三十二節云少陰病咽中傷生瘡不能語言聲不出者苦酒湯主之此言水不上交甚則兼及於肺而宜斂也第三十三節云少陰病咽中痛半夏散及湯主之此言水不上交正治不愈者宜用從治之法也此數節承第三十節咽痛立論為少陰上火作一楄也下利為少陰證下水之一楄自三十四節至三十七節皆言水火不交則水中無火火失閉藏之職至三十八節變回陽之法為和解三十九節變辛溫之法為清利而推言中焦不輸之下利言其常亦不遺其變俱補出少陰主樞之義今試再詳之第三十四節謂少陰病下利白通湯主之示少陰下利以此為專方第三十五節謂少陰病下利脈微者與白通湯利不止厥逆無脈乾嘔煩者白通加豬膽汁湯主之服湯脈暴出者死微續者生此言寒盛驟投熱藥而拒格必取熱因寒用之法也第三十六節謂少陰病二三日不已至四五日腹痛小便不利四肢沉重疼痛自下利者此為有水氣其人或咳或小便利或下利或嘔者真武湯主之此言水中無火則土虛不能制水此為有水氣五字最重為少陰之側面文章非白通四逆之為正面文章也第三十七節謂少陰病下利清穀裡寒外熱手足厥逆脈微欲絶身反不惡寒其人面赤色或腹痛或乾嘔或咽痛或利止脈不出者通脈四逆湯主之此言內真寒而外假熱為少陰之正面文章又為四逆證之進一步文章也自三十一節至此承上第三十節下利立論為少陰證下水作一楄也第三十八節謂少陰四逆其人或咳或悸或小便不利或腹中痛或泄利下重者四逆散主之此承四逆不專主於虛寒復設和解一法以示變動不居之意所以暗補出主樞之義也第三十九節謂少陰下利六七日咳而嘔渴心煩不得眠者豬苓湯主之此承下利雖屬於下焦至六七日寒變為熱而氣復上行病見咳嘔渴煩不眠等證所謂下行極而上也復設一清利法遵經旨邪氣自下而上者仍須從下引而出之亦所以暗補出主樞之義也跟上第三十節全節大意主樞作一楄也所以然者少陰為性命之根病有水火之分治若焚溺之救稍遲則不可挽矣第四十節云少陰病得之二三日口燥舌乾者急下之宜大承氣湯此言少陰君火亢於上不戢將自焚也第四十一節云少陰病自利清水色純青心下必痛口乾燥者急下之宜大承氣湯此言少陰君火亢於上加以木火煽之一水不能勝二火而立竭矣第四十二節云少陰病六七日腹脹不大便者急下之宜大承氣湯此言少陰君火不能從樞而出逆於地中而為脹即內經所謂一息不運則針機窮必急下以運少陰之樞而使轉之少陰三急下證宜於淺注而熟玩之又有二急溫症第四十三節云少陰病脈沉遲者急溫之宜四逆湯言少陰為性命之根起首脈沉預知已伏四逆吐利煩燥之機即易履霜堅冰至之義蓋於人所易忽者獨知所重而急治之也第四十四節云少陰病飲食入口則吐心中溫溫欲吐復不能吐陰寒拒格不納露出樞象始得之手足寒脈弦遲者此胸中實不可下也當吐之借胸中實可吐證敘出急溫症若膈上有寒飲乾嘔者不可吐也急溫之宜四逆湯此少陰陰氣上沵寒飲不同於胸實蓋人所搖移者得所獨斷而急治之也究而言之少陰重在救陽而真陰亦不可傷第四十五節云少陰病下利脈微陽虛澀陰虛嘔而汗出陽虛則陰寒上逆而為嘔陰虛則陰不內守而汗出必數更衣反少者七字是一節之眼目陽虛則氣下墜陰虛則動努矣當溫其上灸之言當灸百會一穴以溫其上不可偏溫其下以灼真陰言外見對待之陰陽分而為兩互根之陰陽合而為一也少陰篇文字空靈幻變不可方物老子其猶龍矣乎
