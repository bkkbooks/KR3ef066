body:
  text: 序傷寒醫訣串解者長樂陳修園先生晚年所編集也惜六篇之中尚缺其一以其未成書故不及付梓其門徒猶子陳道著有盧扁風閩之名醫也既能學先生之學又能承先生之志日嘗手披而祕藏之復體會其遺意而敬續一篇以補其缺合成六篇而篇帙遂成茲修園古矣其猶子道著亦古矣閩中林子壽萱專心衛世於舊書肆中檢得修園先生注解葛可久十藥神書一卷購而珍存之並恐此二種沒而不彰因細加讎校韻而録之欲與兩先生傳名兼以傳世值余奉命巡撫全閩因舊疾復起探知林子精於療治常勞診視論及閩中名醫林子以陳修園陳道著兩先生對敬以修園先生所著南雅堂十一種醫書見示且餘本善病人也又耳熟是書久矣適林子復以傷寒醫訣串解手録一通乞序於余余不敏每兢兢官守尚恐才不足以經世何暇論及衛世然串解實補傷寒淺注所未備不可以無傳若再附以十藥神書注解合而刻之庶可以作岐黃家祕本矣今之術岐黃者果能默會精審互相參校其裨益良不淺也姑就林子所述其緣起為之辨數語於簡端云爾咸豐丙辰秋九月望後三日福建巡撫呂佺孫書序曩集傷寒淺注凡三百九十七法依法條晰期於明白易曉而又慮學者未能融會貫通而得其要旨也不揣固陋復為綜貫衍繹名曰傷寒醫訣串解其於疑似細微之處抉剔詳辨頗費苦心修園老矣敢謂於此道三折肱然有志之士誠能即此紬繹其端緒推尋其綱領而不眩於似是而非未必非活國活人之一助也閩長樂陳念祖修園識
